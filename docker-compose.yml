version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: medvault_user
      POSTGRES_PASSWORD: medvault_password
      POSTGRES_DB: medvault_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medvault_user -d medvault_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/medvault_db
      - SPRING_DATASOURCE_USERNAME=medvault_user
      - SPRING_DATASOURCE_PASSWORD=medvault_password
      - JWT_SECRET=YourSuperSecretKeyForJwtAuthenticationWhichMustBeLongEnough123!
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
