version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: medvault-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: medvault_user
      POSTGRES_PASSWORD: medvault_password
      POSTGRES_DB: medvault
    volumes:
      - medvault_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  medvault_pgdata:
