server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to Spring Boot backend
    location /api/ {
        proxy_pass http://backend:8080/api/;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
