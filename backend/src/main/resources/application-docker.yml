spring:
  datasource:
    url: jdbc:postgresql://db:5432/medvault
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

jwt:
  secret: ${JWT_SECRET:dev-secret-key-at-least-32-characters-long-for-hmac-sha256}
  expiration: ${JWT_EXPIRATION:86400000}
