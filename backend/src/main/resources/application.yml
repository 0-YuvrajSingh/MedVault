spring:
  profiles:
    active: dev

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/medvault
    username: medvault_user
    password: medvault_password
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    url: jdbc:postgresql://localhost:5432/medvault
    user: medvault_user
    password: medvault_password

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:dev-secret-key-at-least-32-characters-long-for-hmac-sha256}
  expiration: ${JWT_EXPIRATION:86400000}   # 24 hours for dev

logging:
  level:
    com.medvault: DEBUG
