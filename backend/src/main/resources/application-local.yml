spring:
  datasource:
    url: jdbc:h2:mem:medvault_local;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

jwt:
  secret: ${JWT_SECRET:YourSuperSecretKeyForJwtAuthenticationWhichMustBeLongEnough123!}
  expiration: ${JWT_EXPIRATION:86400000}
